<div class="min-h-screen bg-gray-100 flex items-center justify-center p-6">

  <!-- Card Principal -->
  <div class="w-full max-w-md bg-white rounded-xl shadow-md overflow-hidden p-6 border border-gray-200">

    <!-- Cabeçalho -->
    <div class="flex items-center space-x-3 mb-6">
      <div class="p-2 bg-blue-50 text-blue-600 rounded-lg">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://w3.org">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
          </path>
        </svg>
      </div>
      <div>
        <h2 class="text-xl font-bold text-gray-800">Exportação de Relatório</h2>
        <p class="text-sm text-gray-500">Acompanhamento em tempo real</p>
      </div>
    </div>

    <!-- Informações de Status -->
    <div class="flex justify-between items-center mb-2">
      <span class="text-sm font-medium text-gray-700" id="status-texto">
        {{ statusProcesso }}
      </span>
      <span class="text-sm font-semibold text-blue-600">
        {{ porcentagemProgresso }}%
      </span>
    </div>

    <!-- Container da Barra de Progresso -->
    <div class="w-full bg-gray-200 rounded-full h-4 mb-6 overflow-hidden">
      <!-- Barra Dinâmica (Usa o Property Binding [style.width] do Angular) -->
      <div class="bg-blue-600 h-4 rounded-full transition-all duration-500 ease-out"
        [style.width.%]="porcentagemProgresso"
        [ngClass]="{'bg-green-500': porcentagemProgresso === 100, 'animate-pulse': porcentagemProgresso < 100 && porcentagemProgresso > 0}">
      </div>
    </div>

    <!-- Área de Ação Dinâmica (Aparece apenas quando o Java envia o evento 'fim') -->
    <div class="mt-4">

      <!-- Estado: Processando -->
      <div *ngIf="porcentagemProgresso < 100"
        class="flex items-center justify-center space-x-2 text-sm text-gray-500 bg-gray-50 py-3 rounded-lg border border-dashed border-gray-300">
        <svg class="animate-spin h-5 w-5 text-blue-600" xmlns="http://w3.org" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
          </path>
        </svg>
        <span>Por favor, não feche esta página...</span>
      </div>

      <!-- Estado: Concluído (Libera o Botão de Download) -->
      <div *ngIf="porcentagemProgresso === 100 && linkDownload" class="animate-bounce">
        <a [href]="linkDownload" target="_blank"
          class="w-full flex items-center justify-center space-x-2 bg-green-600 hover:bg-green-700 text-white font-medium py-3 px-4 rounded-lg shadow transition duration-200">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://w3.org">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
          </svg>
          <span>Baixar Relatório PDF</span>
        </a>
      </div>

    </div>

  </div>
</div>
